<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz_app</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

      <div class="screen active" id="start-screen">
        <h1>Quiz Time</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>


      <div class="screen " id="quiz-screen">
        <div class="quiz-header">
          <h2 id="Question-text">Questions goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question"> 5 </span> of <span
                id="total-questions"
              ></span>
            </p>
            <p>score: <span id="score">6</span></p>
          </div>
        </div>
      
        <div id="answers-container">
          <!--   answers goes here using js here-->
        </div>

        <div id="progressbar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <div class="screen " id="result-screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>
            You scored <span id="final-score"> 0 </span> out of <span id="max-score"
              > 5</span
            >
          </p>
          <div class="result-message">Keep studying! you'll get better</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
      </div>

    <script src="script.js"></script>
  </body>
</html>
